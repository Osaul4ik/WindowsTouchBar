name: Build EXE

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 6 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore dependencies
        run: dotnet restore WindowsTouchBar.sln

      - name: Build (Release)
        run: dotnet build WindowsTouchBar.sln -c Release --no-restore

      - name: Publish single-file EXE
        run: >
          dotnet publish WindowsTouchBar/WindowsTouchBar.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsTouchBar-win-x64
          path: publish/**

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/WindowsTouchBar.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}12